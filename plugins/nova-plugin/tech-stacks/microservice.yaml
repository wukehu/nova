# 通用微服务技术栈

name: "microservice"
version: "1.0.0"
description: "通用微服务架构配置 - 语言无关的最佳实践"

# 微服务架构原则
architecture:
  principles:
    - "Single Responsibility - Each service does one thing well"
    - "API First - Design contracts first"
    - "Loose Coupling - Services communicate via APIs"
    - "Bounded Contexts - Clear service boundaries"
    - "Event-Driven - Use events for async communication"
    - "Fail Fast - Circuit breakers and retries"
    - "Observability - Logs, metrics, tracing everywhere"

# 服务类型
service_types:
  - id: "stateless"
    name: "无状态服务"
    description: "请求处理服务，无本地状态"
    examples:
      - "API Gateway"
      - "Authentication Service"
      - "Notification Service"
      - "Logging Service"

  - id: "stateful"
    name: "有状态服务"
    description: "管理业务数据的服务"
    examples:
      - "User Service"
      - "Order Service"
      - "Product Service"
      - "Inventory Service"

  - id: "event-processor"
    name: "事件处理器"
    description: "消费和处理事件的服务"
    examples:
      - "Analytics Service"
      - "Audit Logger"
      - "Event Aggregator"

  - id: "task-worker"
    name: "任务处理器"
    description: "异步处理长时间任务的服务"
    examples:
      - "Report Generator"
      - "Email Sender"
      - "Data Exporter"

# API 设计
api_design:
  restful:
    - "Use proper HTTP methods (GET, POST, PUT, DELETE, PATCH)"
    - "Use proper status codes (200, 201, 400, 401, 403, 404, 500)"
    - "Use resource-based URLs (/users/{id})"
    - "Support filtering, sorting, pagination"
    - "Use CORS headers"
    - "Implement rate limiting"
    - "Use API versioning (/v1/, /v2/)"
    - "Document with OpenAPI/Swagger"

  graphql:
    - "Schema-first design"
    - "Use proper types and mutations"
    - "Implement query complexity analysis"
    - "Use DataLoader for batching"
    - "Implement query caching"
    - "Document with GraphQL schema"
    - "Use subscriptions for real-time updates"

  grpc:
    - "Use Protocol Buffers for efficiency"
    - "Define clear service contracts"
    - "Use streaming for large data sets"
    - "Implement bidirectional streaming"
    - "Use gRPC interceptors for auth, logging, metrics"
    - "Generate client stubs"
    - "Document with Protocol Buffers comments"

# 通信模式
communication:
  synchronous:
    - "REST/gRPC for request/response"
    - "Use timeout and retries"
    - "Implement circuit breakers"
    - "Use bulkhead pattern"

  asynchronous:
    - "Message queues (RabbitMQ, Kafka, SQS)"
    - "Event-driven architecture"
    - "Use message schemas (Avro, Protobuf)"
    - "Implement dead-letter queues"
    - "Use message ordering"
    - "Implement event sourcing (optional)"

  patterns:
    - id: "request-response"
      name: "请求-响应模式"
      description: "直接调用，等待响应"
      use_when: "Simple queries, low latency requirements"
      tools: ["REST", "gRPC"]

    - id: "async-messaging"
      name: "异步消息模式"
      description: "发送消息，继续执行"
      use_when: "Fire-and-forget, eventual consistency"
      tools: ["Kafka", "RabbitMQ", "SQS", "Redis Pub/Sub"]

    - id: "event-sourcing"
      name: "事件溯源模式"
      description: "存储事件，重建状态"
      use_when: "Audit trails, temporal queries, eventual consistency"
      tools: ["Kafka", "EventStore", "CQRS"]

    - id: "cqrs"
      name: "CQRS 模式"
      description: "命令和查询分离"
      use_when: "Complex domains, high read/write ratios"
      tools: ["Kafka", "EventStore"]

# 服务发现
service_discovery:
  approaches:
    - id: "kubernetes"
      name: "Kubernetes Service Discovery"
      description: "Use Kubernetes services and DNS"
      tools: ["CoreDNS", "Kubernetes API"]

    - id: "consul"
      name: "Consul"
      description: "Consul service registry"
      tools: ["Consul Agent", "DNS", "HTTP API"]

    - id: "etcd"
      name: "etcd"
      description: "etcd distributed key-value store"
      tools: ["etcd client", "gRPC gateway"]

  best_practices:
    - "Use DNS-based discovery (fast, reliable)"
    - "Implement health checks (/health, /ready)"
    - "Use service versioning"
    - "Implement graceful degradation"
    - "Cache service addresses"
    - "Handle service failures"

# 配置管理
configuration:
  sources:
    - id: "environment-variables"
      name: "环境变量"
      description: "12-factor app approach"
      tools: ["Docker environment", "Kubernetes ConfigMaps"]

    - id: "config-server"
      name: "配置服务器"
      description: "Spring Cloud Config, Consul, etcd"
      tools: ["Spring Cloud Config Server", "Consul KV", "etcd"]

    - id: "feature-flags"
      name: "功能开关"
      description: "Dynamic feature toggles"
      tools: ["Unleash", "LaunchDarkly", "FeatureFlag service"]

  best_practices:
    - "Use 12-factor app for credentials"
    - "Store non-sensitive config in code"
    - "Use config validation"
    - "Implement config hot-reload (optional)"
    - "Document all configuration options"
    - "Use different configs per environment"

# 数据存储
data_storage:
  database:
    - id: "sql"
      name: "关系型数据库"
      use_when: "ACID transactions, complex queries"
      options: ["PostgreSQL", "MySQL", "SQL Server"]
      patterns: ["Database per service", "Shared database"]

    - id: "nosql"
      name: "NoSQL 数据库"
      use_when: "Flexible schema, high write throughput"
      options: ["MongoDB", "Cassandra", "Couchbase"]
      patterns: ["Database per service", "Shared database"]

    - id: "key-value"
      name: "键值存储"
      use_when: "Caching, sessions, simple data"
      options: ["Redis", "Memcached", "Hazelcast"]
      patterns: ["Shared cache", "Distributed cache"]

  data_consistency:
    - id: "strong-consistency"
      name: "强一致性"
      use_when: "Financial data, inventory"
      pattern: "Two-Phase Commit (2PC)"

    - id: "eventual-consistency"
      name: "最终一致性"
      use_when: "User data, social features"
      pattern: "Eventual consistency (BASE, CRDTs)"

    - id: "causal-consistency"
      name: "因果一致性"
      use_when: "Audit trails, temporal queries"
      pattern: "CQRS with event sourcing"

  best_practices:
    - "Choose consistency based on use case"
    - "Use database per service for isolation"
    - "Use shared database with schema per service"
    - "Implement proper indexing"
    - "Use connection pooling"
    - "Implement backup and recovery"
    - "Use read replicas for scale"

# 弹性模式
resilience:
  patterns:
    - id: "circuit-breaker"
      name: "断路器"
      description: "Stop calling failing services"
      implementation:
        - "Detect failures"
        - "Open circuit after threshold"
        - "Half-open for testing"
        - "Auto-close on recovery"
        - "Fallback to cached data or default"

    - id: "retry"
      name: "重试"
      description: "Retry failed requests"
      implementation:
        - "Exponential backoff"
        - "Max retry limit"
        - "Idempotent operations"
        - "Retry on specific errors"

    - id: "bulkhead"
      name: "Bulk头"
      description: "Aggregate multiple requests"
      implementation:
        - "Buffer requests for timeout"
        - "Single request to service discovery"
        - "Fan out to all instances"
        - "Return first successful response"

    - id: "timeout"
      name: "超时"
      description: "Don't wait forever"
      implementation:
        - "Set reasonable timeouts"
        - "Timeout on entire request"
        - "Timeout on individual operations"

    - id: "fallback"
      name: "回退"
      description: "Alternative path on failure"
      implementation:
        - "Cached data"
        - "Default response"
        - "Alternative service"
        - "Degraded functionality"

  best_practices:
    - "Implement circuit breakers for all service calls"
    - "Use exponential backoff for retries"
    - "Set appropriate timeouts"
    - "Implement graceful degradation"
    - "Use caching as fallback"
    - "Log all failures for monitoring"
    - "Alert on circuit state changes"

# 可观测性
observability:
  logging:
    - "Use structured logging (JSON)"
    - "Include correlation IDs"
    - "Log at appropriate levels"
    - "Log request/response pairs"
    - "Log errors with context"
    - "Avoid PII in logs"
    - "Send logs to centralized system"

  metrics:
    - "Expose metrics endpoint"
    - "Track request latency (p50, p90, p99)"
    - "Track error rates"
    - "Track request count"
    - "Track resource usage"
    - "Use Prometheus format"
    - "Use dimensional metrics"

  tracing:
    - "Implement distributed tracing"
    - "Use OpenTelemetry or Jaeger"
    - "Trace service-to-service calls"
    - "Trace async operations"
    - "Include trace context in logs"

  health_checks:
    - "Implement /health endpoint (quick check)"
    - "Implement /ready endpoint (dependencies check)"
    - "Return service version"
    - "Return component status"
    - "Use Kubernetes probes"

  best_practices:
    - "Correlate logs, metrics, traces with trace ID"
    - "Use RED (Rate, Errors, Duration)"
    - "Set up alerts for critical metrics"
    - "Log at entry/exit points"
    - "Don't log sensitive data"
    - "Use sampling for high-volume logs"

# 安全性
security:
  authentication:
    - "Implement API key authentication"
    - "Implement JWT token authentication"
    - "Use OAuth 2.0 for user-facing services"
    - "Implement token refresh"
    - "Use short-lived tokens"

  authorization:
    - "Implement role-based authorization"
    - "Implement permission checks"
    - "Use ABAC (Attribute-Based Access Control)"
    - "Implement resource-level permissions"

  transport_security:
    - "Use HTTPS in production"
    - "Use TLS 1.3+"
    - "Implement certificate pinning"
    - "Use mutual TLS for service-to-service"

  api_security:
    - "Implement rate limiting"
    - "Implement request validation"
    - "Sanitize all input"
    - "Use parameterized queries"
    - "Implement CORS properly"
    - "Use security headers"
    - "Implement API key rotation"

  service_security:
    - "Use network segmentation"
    - "Implement service-to-service auth"
    - "Use secrets management (Vault, KMS)"
    - "Encrypt data at rest"
    - "Implement audit logging"
    - "Follow OWASP guidelines"

# 部署
deployment:
  containerization:
    - "Use Docker"
    - "Use multi-stage Dockerfile"
    - "Use Alpine or Distroless base"
    - "Minimize image size"
    - "Use non-root user"
    - "Scan images for vulnerabilities"

  orchestration:
    - id: "kubernetes"
      name: "Kubernetes"
      features:
        - "Use ConfigMaps for configuration"
        - "Use Secrets for sensitive data"
        - "Implement health checks"
        - "Set resource limits and requests"
        - "Use liveness and readiness probes"
        - "Implement graceful shutdown"
        - "Use horizontal pod autoscaler"
        - "Implement rolling updates"
        - "Use persistent volumes for logs"
        - "Implement network policies"
        - "Use service mesh (Istio, Linkerd)"

    - id: "docker-compose"
      name: "Docker Compose"
      features:
        - "Use for local development"
        - "Use .env file for configuration"
        - "Define services and networks"
        - "Use volume mounts for persistence"

  ci_cd:
    - "Run tests on every commit"
    - "Run security scans"
    - "Build Docker images"
    - "Push to registry"
    - "Deploy to staging on PR"
    - "Run integration tests on staging"
    - "Manual approval for production"
    - "Implement blue-green deployment"
    - "Implement rollback strategy"

  best_practices:
    - "Use infrastructure as code"
    - "Immutable infrastructure"
    - "Use canary deployments"
    - "Implement progressive delivery"
    - "Use feature flags for deployments"
    - "Automate rollback on failure"

# 测试策略
testing:
  unit_tests:
    - "Test business logic"
    - "Mock external dependencies"
    - "Aim for high coverage"
    - "Test edge cases"

  integration_tests:
    - "Test service-to-service communication"
    - "Use testcontainers for dependencies"
    - "Test API contracts"
    - "Test error scenarios"

  contract_tests:
    - "Use consumer-driven contracts"
    - "Use Pact for contract testing"
    - "Test API compatibility"
    - "Test message schemas"

  load_tests:
    - "Simulate production load"
    - "Use Locust, JMeter, k6"
    - "Test SLO and error rates"
    - "Identify bottlenecks"

  chaos_testing:
    - "Test failure scenarios"
    - "Use Chaos Monkey or Chaos Mesh"
    - "Test resilience patterns"
    - "Test graceful degradation"

  e2e_tests:
    - "Test critical user flows"
    - "Use real data"
    - "Test across services"
    - "Monitor performance"

  best_practices:
    - "Write tests alongside code"
    - "Test happy paths and error paths"
    - "Use test doubles for slow services"
    - "Automate testing in CI/CD"
    - "Keep tests fast and reliable"

# 最佳实践总结
best_practices:
  architecture:
    - "Start with domain modeling"
    - "Define clear service boundaries"
    - "Use API-first design"
    - "Implement loose coupling"
    - "Choose appropriate communication pattern"

  data:
    - "Choose database per use case"
    - "Choose consistency level based on requirements"
    - "Implement proper data validation"
    - "Use connection pooling"
    - "Implement caching appropriately"

  resilience:
    - "Implement circuit breakers"
    - "Use retries with backoff"
    - "Implement graceful degradation"
    - "Use timeouts everywhere"
    - "Test failure scenarios"

  observability:
    - "Log everything important"
    - "Expose metrics"
    - "Implement distributed tracing"
    - "Set up alerts"
    - "Monitor health continuously"

  security:
    - "Authenticate and authorize properly"
    - "Validate all input"
    - "Use HTTPS in production"
    - "Manage secrets properly"
    - "Audit sensitive operations"

  deployment:
    - "Use container orchestration"
    - "Implement CI/CD"
    - "Use canary deployments"
    - "Implement rollback strategy"
    - "Monitor deployment health"
