# React Native Mobile App Stack

name: "react-native"
version: "1.0.0"
description: "React Native mobile application stack configuration for iOS and Android"

# Project structure
project_structure:
  app:
    - src/
        - components/        # Reusable components
        - screens/           # Screen components
        - navigation/        # Navigation configuration
        - hooks/            # Custom hooks
        - services/          # API calls and services
        - stores/           # State management
        - contexts/          # React contexts
        - utils/            # Utility functions
        - types/            # TypeScript types
        - constants/         # Constants
        - themes/           # Theming
        - assets/           # Images, fonts, etc.
    - android/             # Android-specific code
    - ios/                # iOS-specific code
    - __tests__/           # Tests
    - App.tsx             # App entry
    - index.tsx           # Entry point
    - package.json         # Dependencies
    - tsconfig.json        # TypeScript config
    - metro.config.js      # Metro bundler config
    - babel.config.js      # Babel config

# Configuration
mobile:
  framework: "react-native"
  version: "0.73+"
  platforms:
    - "ios"
    - "android"
  language: "typescript"
  version: "5+"

  # Navigation
  navigation:
    library: "react-navigation"
    version: "6+"
    stack: "@react-navigation/native-stack"
    bottom_tabs: "@react-navigation/bottom-tabs"
    drawer: "@react-navigation/drawer"
    params: "@react-navigation/native"

  # State management
  state_management: "zustand"
  version: "4+"

  # Styling
  styling:
    framework: "react-native-paper"
    version: "5+"
    icons: "react-native-vector-icons"
    animations: "react-native-reanimated"
    gestures: "react-native-gesture-handler"

  # Networking
  networking:
    http_client: "axios"
    version: "1+"
    websocket: "react-native-use-websocket"

  # Storage
  storage:
    async: "@react-native-async-storage/async-storage"
    secure: "react-native-keychain"

  # Device APIs
  device_apis:
    - "react-native-permissions"
    - "react-native-camera"
    - "react-native-image-picker"
    - "react-native-geolocation-service"
    - "@react-native-community/push-notification-ios"
    - "react-native-push-notification"
    - "react-native-fs"
    - "react-native-share"

# Dependencies
dependencies:
    core:
      - "react@^18.2"
      - "react-native@^0.73"
      - "typescript@^5"

    navigation:
      - "@react-navigation/native@^6"
      - "@react-navigation/native-stack@^6"
      - "@react-navigation/bottom-tabs@^6"
      - "@react-navigation/stack@^6"
      - "@react-navigation/drawer@^6"
      - "react-native-screens@^3"
      - "react-native-safe-area-context@^4"
      - "react-native-gesture-handler@^2"

    state:
      - "zustand@^4"
      - "immer@^10"

    ui:
      - "react-native-paper@^5"
      - "react-native-vector-icons@^10"
      - "react-native-reanimated@^3"
      - "@react-native-masked-view/masked-view@^0"

    networking:
      - "axios@^1"
      - "react-native-use-websocket@^2"

    storage:
      - "@react-native-async-storage/async-storage@^1"
      - "react-native-keychain@^8"

    utilities:
      - "date-fns@^2"
      - "lodash@^4"
      - "uuid@^9"
      - "react-native-use@^4"

    forms:
      - "react-hook-form@^7"
      - "zod@^3"

    localization:
      - "i18next@^23"
      - "react-i18next@^13"

dev_dependencies:
  testing:
    - "@testing-library/react-native@^12"
    - "jest@^29"
    - "@types/jest@^29"
    - "detox@^20"

  quality:
    - "eslint@^8"
    - "@typescript-eslint/eslint-plugin@^6"
    - "@typescript-eslint/parser@^6"
    - "prettier@^3"
    - "prettier-plugin-organize-imports@^3"
    - "@commitlint/cli@^18"
    - "husky@^8"

  development:
    - "@types/react@^18"
    - "@types/react-native@^0.73"
    - "@babel/core@^7"
    - "@babel/preset-env@^7"
    - "@babel/preset-typescript@^7"
    - "metro-react-native-babel-preset@^0"
    - "@babel/runtime@^7"

# Testing configuration
testing:
  framework: "jest"
  version: "29+"

  unit_tests:
    framework: "jest"
    mocking: "jest.mock"
    assertions: "expect"
    coverage_target: 80

  integration_tests:
    framework: "detox"
    version: "20+"
    coverage_target: 70

  e2e_tests:
    framework: "detox"
    platforms: ["ios", "android"]
    headless: true

  # Test best practices
  practices:
    - "Test component logic, not implementation"
    - "Use shallow rendering for unit tests"
    - "Use full rendering for integration tests"
    - "Use Detox for E2E tests"
    - "Mock native modules"
    - "Test navigation flows"
    - "Test async operations"
    - "Use waitFor for async tests"
    - "Clean up after tests"

# Code standards
code_standards:
  react_native:
    - "Use TypeScript for type safety"
    - "Use functional components"
    - "Use hooks instead of class components"
    - "Use proper prop types with TypeScript"
    - "Avoid inline styles, use StyleSheet"
    - "Use useMemo/useCallback for optimization"
    - "Use proper key props"
    - "Avoid memory leaks (cleanup effects)"
    - "Use conditional rendering carefully"

  typescript:
    - "Use strict mode"
    - "Avoid 'any' types"
    - "Use proper interfaces"
    - "Use type guards"
    - "Define prop types for components"

  navigation:
    - "Use type-safe navigation params"
    - "Handle deep linking"
    - "Use screen-specific params types"
    - "Handle navigation state restoration"

    state_management:
    - "Keep state simple"
    - "Use persist middleware for AsyncStorage"
    - "Separate UI and server state"
    - "Use devtools for debugging"

# Security
security:
  practices:
    - "Store sensitive data in Keychain/Keystore"
    - "Use HTTPS for all API calls"
    - "Validate all user input"
    - "Sanitize error messages"
    - "Implement proper authentication flow"
    - "Use secure token storage"
    - "Implement certificate pinning"
    - "Properly handle permissions"
    - "Encrypt local data"
    - "Implement biometric authentication"
    - "Set proper Info.plist/AndroidManifest values"
    - "Disable screenshots for sensitive screens"

  owasp_mobile:
    - "M1: Improper Platform Usage"
    - "M2: Insecure Data Storage"
    - "M3: Insecure Communication"
    - "M4: Insecure Authentication"
    - "M5: Insufficient Cryptography"
    - "M6: Insecure Authorization"
    - "M7: Client Code Quality"
    - "M8: Code Tampering"
    - "M9: Reverse Engineering"
    - "M10: Extraneous Functionality"

# Performance
performance:
  practices:
    - "Use React.memo for expensive components"
    - "Use useMemo/useCallback for optimization"
    - "Avoid unnecessary re-renders"
    - "Use FlatList for long lists"
    - "Optimize images (resize, format)"
    - "Use lazy loading for screens"
    - "Implement code splitting"
    - "Use native modules for performance-critical code"
    - "Optimize bundle size"
    - "Use Hermes JavaScript engine"
    - "Profile with Flipper"
    - "Minimize state updates"
    - "Use optimized animations"

  profiling:
    - "Use Flipper for debugging"
    - "Use React DevTools"
    - "Use Performance Monitor"
    - "Profile with Xcode Instruments"
    - "Profile with Android Profiler"

# Deployment
deployment:
  build:
    ios:
      - "Use Xcode for building"
      - "Configure signing and provisioning"
      - "Use fastlane for automation"
      - "Enable bitcode (if needed)"
      - "Configure app size optimization"
      - "Test on physical devices"

    android:
      - "Use Gradle for building"
      - "Configure signing"
      - "Use ProGuard/R8 for code obfuscation"
      - "Configure app bundles (AAB)"
      - "Configure APK splits"
      - "Enable multidex if needed"

  ci_cd:
    - "Use GitHub Actions or Bitrise"
    - "Automate builds on push"
    - "Run tests before deployment"
    - "Automate beta distribution"
    - "Use TestFlight for iOS"
    - "Use Google Play Internal Test for Android"

  app_stores:
    ios:
      - "App Store Connect"
      - "Follow App Store guidelines"
      - "Provide screenshots and metadata"
      - "Configure app categories"
      - "Set pricing and availability"

    android:
      - "Google Play Console"
      - "Follow Google Play policies"
      - "Provide screenshots and metadata"
      - "Configure content rating"
      - "Set pricing and distribution"

# Accessibility
accessibility:
  practices:
    - "Use accessibilityLabel for interactive elements"
    - "Use accessibilityHint for additional context"
    - "Use accessibilityRole for semantic meaning"
    - "Support screen readers (VoiceOver/TalkBack)"
    - "Support dynamic type sizes"
    - "Support high contrast mode"
    - "Support reduce motion setting"
    - "Use proper focus management"
    - "Test accessibility with accessibility inspector"
    - "Follow WCAG guidelines"

# Internationalization
internationalization:
  practices:
    - "Separate text from code"
    - "Use i18n libraries"
    - "Support RTL languages"
    - "Format dates and numbers locally"
    - "Provide localized images"
    - "Test with different locales"
    - "Handle pluralization correctly"
    - "Support timezone differences"

# Best practices
best_practices:
  architecture:
    - "Use clean architecture"
    - "Separate business logic from UI"
    - "Use dependency injection"
    - "Implement proper error handling"
    - "Use design patterns appropriately"

  code_quality:
    - "Write testable code"
    - "Use TypeScript for type safety"
    - "Follow coding standards"
    - "Write comprehensive tests"
    - "Aim for high test coverage"

  user_experience:
    - "Provide loading states"
    - "Handle offline mode"
    - "Provide error states"
    - "Implement pull-to-refresh"
    - "Provide smooth animations"
    - "Handle different screen sizes"

  performance:
    - "Optimize startup time"
    - "Minimize bundle size"
    - "Optimize list rendering"
    - "Implement efficient caching"
    - "Profile regularly"

  security:
    - "Secure data storage"
    - "Secure communication"
    - "Implement proper auth"
    - "Handle permissions properly"
    - "Protect against reverse engineering"
