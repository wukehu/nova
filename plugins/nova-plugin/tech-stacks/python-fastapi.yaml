# Python FastAPI 技术栈

name: "python-fastapi"
version: "1.0.0"
description: "Python FastAPI 完整技术栈配置 - 从开发到部署的最佳实践"

# 项目结构
project_structure:
  backend:
    - app/
        - __init__.py
        - main.py              # 应用入口
        - api/                 # API 路由
        - models/              # 数据模型
        - schemas/             # Pydantic 模式
        - services/            # 业务逻辑
        - repositories/         # 数据访问
        - core/                # 核心功能
            - config.py       # 配置管理
            - security.py     # 安全相关
            - database.py     # 数据库连接
            - exceptions.py   # 自定义异常
        - utils/               # 工具函数
    - tests/
        - unit/
        - integration/
        - e2e/
    - alembic/              # 数据库迁移
    - pyproject.toml          # 项目配置
    - requirements.txt        # 依赖
    - requirements-dev.txt    # 开发依赖
    - .env.example            # 环境变量示例

# 后端配置
backend:
  language: "python"
  version: "3.11+"
  framework: "fastapi"
  version: "0.104+"

  # 依赖管理
  dependencies:
    - "fastapi>=0.104.0"
    - "uvicorn[standard]>=0.24.0"
    - "pydantic>=2.0.0"
    - "pydantic-settings>=2.0.0"
    - "sqlalchemy>=2.0.0"
    - "alembic>=1.12.0"
    - "python-jose[cryptography]>=3.3.0"
    - "passlib[bcrypt]>=1.7.4"
    - "python-multipart>=0.0.6"
    - "aiofiles>=23.2.1"

  # 开发依赖
  dev_dependencies:
    - "pytest>=7.4.0"
    - "pytest-asyncio>=0.21.0"
    - "pytest-cov>=4.1.0"
    - "httpx>=0.24.0"
    - "black>=23.7.0"
    - "isort>=5.12.0"
    - "flake8>=6.1.0"
    - "mypy>=1.5.0"
    - "pre-commit>=3.4.0"

# 数据库配置
database:
  default: "postgresql"
  options:
    - name: "postgresql"
      version: "15+"
      driver: "asyncpg"
      orm: "sqlalchemy"
      migrations: "alembic"
    - name: "mysql"
      version: "8.0+"
      driver: "aiomysql"
      orm: "sqlalchemy"
      migrations: "alembic"
    - name: "sqlite"
      version: "3+"
      driver: "aiosqlite"
      orm: "sqlalchemy"
      migrations: "alembic"

# 缓存配置
cache:
  default: "redis"
  options:
    - name: "redis"
      version: "7+"
    - name: "memcached"
      version: "1.6+"

# 测试配置
testing:
  framework: "pytest"
  version: "7.4+"

  unit_tests:
    framework: "pytest"
    plugins:
      - "pytest-asyncio"
      - "pytest-cov"
    coverage_target: 80

  integration_tests:
    framework: "pytest"
    fixtures: "testcontainers"
    coverage_target: 80

  e2e_tests:
    framework: "playwright"
    browsers: ["chromium", "firefox"]
    headless: true

  # 测试最佳实践
  practices:
    - "Write unit tests for business logic"
    - "Write integration tests for API endpoints"
    - "Use pytest fixtures for test data"
    - "Use pytest-mock for mocking"
    - "Write E2E tests with Playwright"
    - "Aim for 80%+ test coverage"
    - "Test edge cases and error conditions"
    - "Use async/await for async tests"

# 代码规范
code_standards:
  python:
    - "Use type hints for all functions"
    - "Write docstrings for all public functions"
    - "Follow PEP 8 style guide"
    - "Use async/await for I/O operations"
    - "Use dependency injection"
    - "Separate business logic from data access"
    - "Use Pydantic for data validation"
    - "Use SQLAlchemy ORM"
    - "Use Alembic for migrations"

  fastapi:
    - "Use dependency injection for services"
    - "Use Pydantic models for request/response"
    - "Use APIRouter for route organization"
    - "Implement proper error handling"
    - "Use HTTPException for client errors"
    - "Use background tasks for async operations"
    - "Implement proper authentication/authorization"
    - "Use middleware for cross-cutting concerns"

# 格式化工具
formatting:
  code_formatter: "black"
  version: "23.7+"
  config: "."
  options:
    - "line_length: 100"
    - "target_version: py311"

  import_sorter: "isort"
  version: "5.12+"
  config: "."
  options:
    - "profile: black"

  linter: "flake8"
  version: "6.1+"
  config: "."
  options:
    - "max_line_length: 100"
    - "ignore: ['E203', 'W503']"

  type_checker: "mypy"
  version: "1.5+"
  config: "."
  options:
    - "strict: true"
    - "warn_return_any: true"

# 安全最佳实践
security:
  authentication: "jwt"
  authorization: "role-based"

  practices:
    - "Validate all user input with Pydantic"
    - "Use parameterized queries"
    - "Implement proper authentication"
    - "Use JWT for API authentication"
    - "Implement rate limiting"
    - "Sanitize error messages"
    - "Use environment variables for secrets"
    - "Implement CORS properly"
    - "Use HTTPS in production"
    - "Implement password hashing with bcrypt"
    - "Use secure session management"
    - "Implement API key authentication"
    - "Validate file uploads"
    - "Implement security headers"

  owasp_top_10:
    - "A01:2021 - Broken Access Control"
    - "A02:2021 - Cryptographic Failures"
    - "A03:2021 - Injection"
    - "A04:2021 - Insecure Design"
    - "A05:2021 - Security Misconfiguration"
    - "A07:2021 - Identification and Authentication Failures"
    - "A08:2021 - Software and Data Integrity Failures"
    - "A09:2021 - Security Logging and Monitoring Failures"
    - "A10:2021 - Server-Side Request Forgery"

# 性能优化
performance:
  practices:
    - "Use async/await for I/O"
    - "Use connection pooling"
    - "Implement caching with Redis"
    - "Use database indexes"
    - "Optimize queries"
    - "Use pagination for large result sets"
    - "Implement lazy loading"
    - "Profile bottlenecks"
    - "Use compression for responses"
    - "Implement rate limiting"
    - "Use CDN for static assets"

  async_operations:
    - "Use async/await for I/O"
    - "Use asyncio.gather for parallel operations"
    - "Use background tasks for long operations"
    - "Implement proper error handling for async"

  database_optimization:
    - "Use database indexes"
    - "Optimize N+1 queries"
    - "Use connection pooling"
    - "Use read replicas for read-heavy workloads"
    - "Implement query caching"

  caching:
    - "Use Redis for caching"
    - "Implement cache invalidation"
    - "Use cache warming"
    - "Implement cache busting"

# 部署配置
deployment:
  docker:
    - "Use multi-stage Dockerfile"
    - "Use Alpine base images"
    - "Optimize layer caching"
    - "Minimize image size"
    - "Use .dockerignore"
    - "Use non-root user"
    - "Implement health checks"

  kubernetes:
    - "Use ConfigMaps for configuration"
    - "Use Secrets for sensitive data"
    - "Implement health checks"
    - "Set resource limits"
    - "Use liveness and readiness probes"
    - "Implement graceful shutdown"
    - "Use horizontal pod autoscaler"
    - "Implement rolling updates"

  ci_cd:
    - "Run tests on every commit"
    - "Run linting and type checking"
    - "Build Docker images"
    - "Run security scans"
    - "Deploy to staging on PR"
    - "Run E2E tests on staging"
    - "Manual approval for production"
    - "Implement rollback strategy"

# 日志和监控
logging:
  framework: "structlog"
  level: "INFO"
  format: "json"

  practices:
    - "Use structured logging"
    - "Log request/response for API endpoints"
    - "Log errors with stack traces"
    - "Use log levels appropriately"
    - "Implement log rotation"
    - "Send logs to centralized system"

monitoring:
  metrics: "prometheus"
  tracing: "opentelemetry"
  alerts: "alertmanager"

  practices:
    - "Expose metrics endpoint"
    - "Track request latency"
    - "Track error rates"
    - "Track request count"
    - "Implement distributed tracing"
    - "Set up alerts for critical errors"
    - "Monitor resource usage"

# 文档
documentation:
  api: "fastapi automatic docs"
  framework: "sphinx"
  format: "markdown"

  practices:
    - "Use Pydantic models for API documentation"
    - "Write docstrings for all endpoints"
    - "Include examples in API docs"
    - "Write comprehensive README"
    - "Document configuration options"
    - "Document deployment process"
    - "Keep changelog up to date"

# 最佳实践总结
best_practices:
  architecture:
    - "Use layered architecture (API → Service → Repository)"
    - "Implement dependency injection"
    - "Use Pydantic for data validation"
    - "Separate concerns (business logic, data access)"

  code_quality:
    - "Write type hints"
    - "Write docstrings"
    - "Follow PEP 8"
    - "Use Black, isort, flake8, mypy"
    - "Write comprehensive tests"

  performance:
    - "Use async/await for I/O"
    - "Implement caching"
    - "Optimize database queries"
    - "Use connection pooling"

  security:
    - "Validate all input"
    - "Use JWT for authentication"
    - "Implement rate limiting"
    - "Use HTTPS in production"
    - "Follow OWASP guidelines"

  deployment:
    - "Use Docker"
    - "Use Kubernetes"
    - "Implement health checks"
    - "Use CI/CD"
    - "Implement rollback strategy"

  monitoring:
    - "Use structured logging"
    - "Expose metrics"
    - "Implement distributed tracing"
    - "Set up alerts"
